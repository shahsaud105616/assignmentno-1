0<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter app</title>
</head>
<body>

    <h1>Counter App</h1>

    <h2>0</h2>

        <div>
            <button class="btn1">Increament</button>
            <button class="btn2">Decreament</button>
            <button class="btn3">Reset</button>
        </div>

        <script>
            let h2 = document.querySelector("h2");
            let btn1 = document.querySelector(".btn1");
            let btn2 = document.querySelector(".btn2");
            let btn3 = document.querySelector(".btn3");

            let count = 0; // why we use this

            btn1.addEventListener("click", () =>{   // this ,sign mean aero function
                count++;
                h2.innerText = count;
            })

            btn2.addEventListener("click", () => {
                count--;
                h2.innerText = count;
            })

            btn3.addEventListener("click", () =>{
                count = 0;
                h2.innerText = count;
            })


        </script>

</body>
</html>
